{% extends "recetas/base.html" %}
{% block title %}Confirmar Eliminacion{% endblock %}
{% block content %}
<div class="card" style="max-width:450px;margin:auto">
  <div class="card-body text-center">
    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem"></i>
    <h4 class="mt-3">Eliminar: {{ objeto }}?</h4>
    <form method="post" class="d-flex gap-2 justify-content-center mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Si, eliminar</button>
      <a href="/recetas/" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
