<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Recetas{% endblock %} - Lab07</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f5f5f5; }
    .navbar { background: linear-gradient(135deg,#1b5e20,#2e7d32); }
    .card  { border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
    h2 { color:#1b5e20; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/recetas/"><i class="bi bi-journal-richtext"></i> Recetas Lab07</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/recetas/">Recetas</a>
      <a class="nav-link" href="/recetas/autores/">Autores</a>
      <a class="nav-link" href="/recetas/nueva/">Nueva Receta</a>
      <a class="nav-link" href="/admin/">Admin</a>
    </div>
  </div>
</nav>
<div class="container mb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
